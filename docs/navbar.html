<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcando Huellita</title>

  <!-- tipografia -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

  <!-- 2. ENLACE A LOS ESTILOS DE BOOTSTRAP (CSS) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- 3. ENLACE A LOS ICONOS DE BOOTSTRAP -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    /* texto del logo */
    .brand-text {
      font-family: 'Fredoka', sans-serif;
    }

    .font-medium {
      font-weight: 500;
      font-size: 0.95rem;
    }

    
    .active-link {
      color: #e04b7b !important;
      border-bottom: 2px solid #e04b7b;
      padding-bottom: 2px !important;
    }

    /* Cambio de color suave al pasar el cursor  */
    .navbar-nav .nav-link:hover, .iconos-derecha a:hover {
      color: #e04b7b !important;
      transition: color 0.2s ease-in-out;
    }
  </style>
</head>
<body>

  <!-- 1. BARRA NARANJA -->
  <div class="text-white text-center py-2 fw-medium" style="background-color: #ff9161; font-size: 0.9rem;">
    🐾 Cada compra ayuda a un refugio animal — ¡Gracias por tu apoyo! 🐾
  </div>

  <!-- 2. NAVBAR PRINCIPAL -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
    <div class="container-fluid px-md-5">
      
      <!-- Logo Izquierda con Fredoka Redondeada -->
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="../assets/img/logo-huellita.png" alt="Logo" width="40" class="me-2"> 
        <div class="d-flex flex-column lh-1 brand-text fw-bold">
          <span style="color: #2b2b2b; font-size: 1.2rem;">Marcando</span>
          <span style="color: #e04b7b; font-size: 1.3rem;">Huellitas</span>
        </div>
      </a>

      <!-- Botón Hamburguesa para Celulares -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMarcandoHuellitas">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Enlaces y Buscador -->
      <div class="collapse navbar-collapse" id="navbarMarcandoHuellitas">
        
        <!-- Enlaces del Menú (Centro) -->
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-3">
          <li class="nav-item">
            <a class="nav-link font-medium active-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-secondary font-medium" href="#productos">Productos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-secondary font-medium" href="#adopciones">Adopciones</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-secondary font-medium" href="#asociaciones">Asociaciones</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-secondary font-medium" href="#refugios">Refugios</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-secondary font-medium" href="#donaciones">Donaciones</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-secondary font-medium" href="#nosotros">Nosotros</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-secondary font-medium" href="#contacto">Contacto</a>
          </li>
        </ul>

        <!-- Buscador e Iconos -->
        <div class="d-flex align-items-center gap-3 iconos-derecha">
          <!-- Input de Búsqueda -->
          <div class="position-relative">
            <input type="text" class="form-control form-control-sm rounded-pill px-3" placeholder="Search..." style="background-color: #f5f5f5; border: none; width: 160px; font-size: 0.85rem; padding-right: 2.5rem;">
            <i class="bi bi-search position-absolute top-50 end-0 translate-middle-y me-3 text-secondary" style="font-size: 0.75rem;"></i>
          </div>

          <!-- Iconos de Acción -->
          <a href="#favoritos" class="text-secondary fs-5"><i class="bi bi-heart"></i></a>
          
          <!-- Carrito con Burbuja -->
          <a href="#carrito" class="position-relative text-secondary fs-5">
            <i class="bi bi-cart3"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-circle" style="background-color: #e04b7b; font-size: 0.55rem; padding: 0.25em 0.45em;">
              2
            </span>
          </a>

          <!-- Perfil/Usuario -->
          <a href="#perfil" class="text-secondary fs-5"><i class="bi bi-person"></i></a>
        </div>

      </div>
    </div>
  </nav>

  <!--- SCRIPT DE BOOTSTRAP --->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
