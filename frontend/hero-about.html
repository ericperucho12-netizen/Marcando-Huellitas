<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Acerca de Nosotros</title>
    <!-- Fuentes -->
    <link
        href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <section class="hero-about">
        <div class="container">
            <div class="row align-items-center hero-row">
                <!-- Texto izquierdo -->
                <div class="col-lg-6 col-md-12 hero-content">
                    <span class="hero-badge">Acerca de nosotros</span>

                    <h1 class="hero-title">
                        ADOPTA CON EL <span>CORAZÓN</span>,<br>
                        CUIDA CON AMOR
                    </h1>

                    <p class="hero-description">
                        En Marcando Huellitas creemos que cada adopción y cada compra pueden convertirse
                        en una oportunidad para cuidar, apoyar y transformar la vida de una mascota.
                    </p>

                    <p class="hero-mini-text">
                        Compra, adopta y apoya a más huellitas.
                    </p>

                    <div class="hero-buttons">
                        <a href="#historia" class="btn btn-hero">
                            Conoce más 🐾
                        </a>

                        <a href="#adopciones" class="btn btn-hero-secondary">
                            Ver adopciones ♡
                        </a>
                    </div>
                </div>

                <!-- Imagen derecha -->
                <div class="col-lg-6 col-md-12 hero-image-content">
                    <div class="hero-blob">
                        <div class="heart-outline"></div>

                        <img src="../assets/PerroGato.png" alt="Perro y gato de Marcando Huellitas"
                            class="hero-pets-img">
                    </div>
                </div>

            </div>
        </div>
    </section>

</body>

</html>
